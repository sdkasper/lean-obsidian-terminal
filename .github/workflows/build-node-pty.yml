name: Build node-pty binaries

on:
  workflow_call:
    inputs:
      node-pty-version:
        required: false
        type: string
        default: "1.1.0"
  workflow_dispatch:
    inputs:
      node-pty-version:
        description: "node-pty version to package"
        required: false
        default: "1.1.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-15
            platform: darwin
            arch: arm64
          - os: macos-15
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install node-pty
        shell: bash
        run: |
          mkdir staging && cd staging
          npm init -y
          npm install node-pty@${{ inputs.node-pty-version || '1.1.0' }}

      - name: Package node-pty
        shell: bash
        run: |
          SRC=staging/node_modules/node-pty
          PKG=$RUNNER_TEMP/node-pty-pkg

          mkdir -p "$PKG/lib"
          cp -r "$SRC/lib/"* "$PKG/lib/"
          cp "$SRC/package.json" "$PKG/"

          # Copy prebuilds (N-API binaries) if they exist for this platform
          if [ -d "$SRC/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}" ]; then
            mkdir -p "$PKG/prebuilds"
            cp -r "$SRC/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}" "$PKG/prebuilds/"
          fi

          # Fallback: copy node-gyp build output (Linux builds from source)
          if [ -d "$SRC/build/Release" ]; then
            mkdir -p "$PKG/build/Release"
            cp -r "$SRC/build/Release/"* "$PKG/build/Release/"
          fi

          # Copy third_party (conpty DLLs) if present
          if [ -d "$SRC/third_party" ]; then
            cp -r "$SRC/third_party" "$PKG/"
          fi

      - name: Apply Windows patch
        if: matrix.platform == 'win32'
        shell: bash
        run: |
          cp patches/windowsConoutConnection.js "$RUNNER_TEMP/node-pty-pkg/lib/windowsConoutConnection.js"

      - name: Create zip
        shell: bash
        run: |
          cd "$RUNNER_TEMP/node-pty-pkg"
          if command -v zip &> /dev/null; then
            zip -r "$GITHUB_WORKSPACE/node-pty-${{ matrix.platform }}-${{ matrix.arch }}.zip" .
          else
            # Compress-Archive with -Path '*' avoids nesting the parent directory name
            powershell -Command "Compress-Archive -Path '${{ runner.temp }}/node-pty-pkg/*' -DestinationPath '${{ github.workspace }}/node-pty-${{ matrix.platform }}-${{ matrix.arch }}.zip'"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: node-pty-${{ matrix.platform }}-${{ matrix.arch }}
          path: node-pty-${{ matrix.platform }}-${{ matrix.arch }}.zip

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          echo "{" > checksums.json
          first=true
          for f in node-pty-*.zip; do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            if [ "$first" = true ]; then first=false; else echo "," >> checksums.json; fi
            printf '  "%s": "%s"' "$f" "$hash" >> checksums.json
          done
          echo "" >> checksums.json
          echo "}" >> checksums.json
          cat checksums.json

      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.json
